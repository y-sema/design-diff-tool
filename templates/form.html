<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>デザイン差分比較ツール</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="file"], input[type="color"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; width: 100%; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>📐 デザイン差分比較ツール</h1>
    <p>比較したい2枚のスクリーンショット画像（PNGやJPEG）を選択してください。</p>
    
    <form action="/compare" method="POST" enctype="multipart/form-data" target="_blank">
        <div class="form-group">
            <label for="image_a">画像A（ベース・本番環境など）:</label>
            <input type="file" id="image_a" name="image_a" accept="image/*" required>
        </div>
        
        <div class="form-group">
            <label for="image_b">画像B（修正後・ステージング環境など）:</label>
            <input type="file" id="image_b" name="image_b" accept="image/*" required>
        </div>

        <div class="form-group">
            <label for="diff_color">差分ハイライト色:</label>
            <input type="color" id="diff_color" name="diff_color" value="#ff0000">
        </div>
        
        <button type="submit">差分を比較する（別タブで開く）</button>
    </form>
</body>
</html>
