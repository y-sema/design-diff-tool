<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>デザイン差分比較ツール (ローカルパッケージ配布)</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #f8f9fa; color: #333; text-align: center; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #007bff; font-size: 28px; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #28a745; color: white; border: none; padding: 16px 30px; font-size: 18px; cursor: pointer; border-radius: 6px; width: 100%; font-weight: bold; box-shadow: 0 4px 10px rgba(40,167,69,0.3); transition: all 0.2s; }
        .btn:hover { background: #218838; transform: translateY(-1px); }
        .info-box { background: #e9ecef; padding: 15px; border-radius: 6px; text-align: left; font-size: 14px; margin-top: 30px; color: #495057; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📐 デザイン差分比較ツール</h1>
        <p>Render（無料プラン）のサーバー制限を回避し、あなたのPCの強力なパワーを使って安全・爆速に自動スクショ＆差分比較を行うためのローカルパッケージをダウンロードします。</p>
        
        <form action="/compare" method="POST">
            <button type="submit" class="btn">🚀 ローカル動作用一式をダウンロード (.zip)</button>
        </form>

        <div class="info-box">
            <b>📦 パッケージに含まれるもの：</b>
            <ul>
                <li><code>index.html</code> (インストール不要。ダブルクリックで動く差分画面)</li>
                <li><code>capture.py</code> (URLを入れるだけで自動撮影するスクリプト)</li>
                <li><code>README.txt</code> (使い方の説明書)</li>
            </ul>
        </div>
    </div>
</body>
</html>
